name: Meridian Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.0.0). Must match meridian/package.json version.'
        required: true
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: write
    defaults:
      run:
        working-directory: meridian

    steps:
      - name: Checkout
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          set -euo pipefail
          ref="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          git clone --depth 1 --branch "$ref" \
            "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" \
            .

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Verify (lint + typecheck + tests + line limits)
        run: |
          npm run lint
          npm run typecheck
          npm run test
          npm run check-lines

      - name: Build macOS DMG (unsigned, no notarization)
        run: npm run build:mac
        env:
          # electron-builder skips notarization when these are absent.
          # See electron-builder.yml mac.notarize: false.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: List build artifacts
        run: ls -lh dist/

      - name: Upload DMG as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: meridian-dmg
          path: meridian/dist/*.dmg
          if-no-files-found: error

  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: write
    defaults:
      run:
        working-directory: meridian

    steps:
      - name: Checkout
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          set -euo pipefail
          ref="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          git clone --depth 1 --branch "$ref" \
            "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" \
            .

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run build:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: List build artifacts
        shell: pwsh
        run: Get-ChildItem dist | Format-Table Name, Length

      - name: Upload Windows installer as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: meridian-windows
          path: meridian/dist/*windows*.exe
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    needs: [build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout changelog
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Download macOS DMG artifact
        uses: actions/download-artifact@v4
        with:
          name: meridian-dmg
          path: release-assets

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: meridian-windows
          path: release-assets

      - name: List release assets
        run: find release-assets -maxdepth 2 -type f | sort

      - name: Create release notes from changelog
        env:
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          awk -v version="$version" '
            $0 ~ "^## \\[" version "\\]" { capture=1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Meridian $TAG" > release-notes.md
          fi

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          mapfile -t files < <(find release-assets -type f | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets found"
            exit 1
          fi
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" "${files[@]}" --repo "$GITHUB_REPOSITORY" --clobber
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --notes-file release-notes.md
          else
            gh release create "$TAG" "${files[@]}" --repo "$GITHUB_REPOSITORY" --title "$TAG" --notes-file release-notes.md
          fi

  trigger-site-rebuild:
    name: Trigger meridian-site rebuild
    runs-on: ubuntu-latest
    needs: [publish-release]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Trigger meridian-site rebuild
        env:
          HOOK_URL: ${{ secrets.CF_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK_URL" ]; then
            echo "::warning::CF_DEPLOY_HOOK_URL secret is not set; meridian-site will not auto-rebuild"
            exit 0
          fi
          status=$(curl -s -o /tmp/resp.txt -w "%{http_code}" -X POST "$HOOK_URL")
          echo "HTTP $status"
          cat /tmp/resp.txt
          [ "$status" = "200" ] || [ "$status" = "201" ]
