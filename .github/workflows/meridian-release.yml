name: Meridian Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.0.0). Must match meridian/package.json version.'
        required: true
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: write
    defaults:
      run:
        working-directory: meridian

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: meridian/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify (lint + typecheck + tests + line limits)
        run: |
          npm run lint
          npm run typecheck
          npm run test
          npm run check-lines

      - name: Build macOS DMG (unsigned, no notarization)
        run: npm run build:mac
        env:
          # electron-builder skips notarization when these are absent.
          # See electron-builder.yml mac.notarize: false.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: List build artifacts
        run: ls -lh dist/

      - name: Upload DMG as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: meridian-dmg
          path: meridian/dist/*.dmg
          if-no-files-found: error

  build-windows-beta:
    name: Build Windows beta installer
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: write
    defaults:
      run:
        working-directory: meridian

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: meridian/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Windows beta installer
        run: npm run build:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: List build artifacts
        shell: pwsh
        run: Get-ChildItem dist | Format-Table Name, Length

      - name: Upload Windows beta as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: meridian-windows-beta
          path: meridian/dist/*windows-beta*.exe
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    needs: [build-macos, build-windows-beta]
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download macOS DMG artifact
        uses: actions/download-artifact@v4
        with:
          name: meridian-dmg
          path: release-assets

      - name: Download Windows beta artifact
        uses: actions/download-artifact@v4
        with:
          name: meridian-windows-beta
          path: release-assets

      - name: List release assets
        run: find release-assets -maxdepth 2 -type f | sort

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          mapfile -t files < <(find release-assets -type f | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets found"
            exit 1
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${files[@]}" --clobber
          else
            gh release create "$TAG" "${files[@]}" --title "$TAG" --notes ""
          fi

  trigger-site-rebuild:
    name: Trigger meridian-site rebuild
    runs-on: ubuntu-latest
    needs: [publish-release]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Trigger meridian-site rebuild
        env:
          HOOK_URL: ${{ secrets.CF_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK_URL" ]; then
            echo "::warning::CF_DEPLOY_HOOK_URL secret is not set; meridian-site will not auto-rebuild"
            exit 0
          fi
          status=$(curl -s -o /tmp/resp.txt -w "%{http_code}" -X POST "$HOOK_URL")
          echo "HTTP $status"
          cat /tmp/resp.txt
          [ "$status" = "200" ] || [ "$status" = "201" ]
